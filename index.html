<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | Learn How To Think</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eclipse: {
                            bg: '#050507',
                            surface: '#121217',
                            border: '#2A2A35',
                            accent: '#6366F1',
                            text: '#E2E8F0',
                            muted: '#94A3B8',
                            sol: '#EAB308',
                            luna: '#8B5CF6'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #050507;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2A2A35; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .glass {
            background: rgba(18, 18, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .eclipse-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Image Placeholders
        const LOGO_IMG = "https://ui-avatars.com/api/?name=E+AI&background=121217&color=fff";
        const LUNA_IMG = "https://ui-avatars.com/api/?name=L&background=8B5CF6&color=fff";
        const SOL_IMG = "https://ui-avatars.com/api/?name=S&background=EAB308&color=000";

        // Icons
        const Icon = ({ name, size = 20, className = "" }) => {
            React.useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // Main App
        function App() {
            const [currentView, setCurrentView] = useState('home');

            return (
                <div className="min-h-screen flex flex-col relative selection:bg-indigo-500/30">
                    <div className="eclipse-glow top-[-200px] left-[-200px]"></div>
                    <div className="eclipse-glow bottom-[-200px] right-[-200px]"></div>
                    
                    <Navbar currentView={currentView} setCurrentView={setCurrentView} />
                    
                    <main className="flex-grow flex flex-col pt-16">
                        {currentView === 'home' && <HomeView setCurrentView={setCurrentView} />}
                        {currentView === 'chat' && <ChatView setCurrentView={setCurrentView} />}
                        {currentView === 'courses' && <CoursesView />}
                        {currentView === 'progress' && <ProgressView />}
                        {currentView === 'pricing' && <PricingView />}
                        {currentView === 'auth' && <AuthView setCurrentView={setCurrentView} />}
                    </main>
                </div>
            );
        }

        // Navigation
        function Navbar({ currentView, setCurrentView }) {
            const navItems = ['Home', 'Chat', 'Courses', 'Progress', 'Pricing'];
            
            return (
                <nav className="fixed top-0 w-full glass z-50 px-6 py-4 flex justify-between items-center">
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentView('home')}>
                        <img src={LOGO_IMG} alt="Eclipse AI" className="w-9 h-9 rounded-full border border-white/10 object-cover" />
                        <span className="text-xl font-bold tracking-tight text-white">Eclipse AI</span>
                    </div>
                    
                    <div className="hidden md:flex items-center gap-6">
                        {navItems.map(item => (
                            <button 
                                key={item}
                                onClick={() => setCurrentView(item.toLowerCase())}
                                className={`text-sm font-medium transition-colors ${currentView === item.toLowerCase() ? 'text-indigo-400' : 'text-eclipse-muted hover:text-white'}`}
                            >
                                {item}
                            </button>
                        ))}
                    </div>

                    <div className="flex items-center gap-4">
                        <button onClick={() => setCurrentView('auth')} className="text-sm font-medium text-eclipse-muted hover:text-white transition-colors">Log In</button>
                        <button onClick={() => setCurrentView('auth')} className="text-sm font-medium bg-white text-black px-5 py-2.5 rounded-full hover:bg-gray-200 transition-all shadow-lg">Sign Up</button>
                    </div>
                </nav>
            );
        }

        // Auth
        function AuthView({ setCurrentView }) {
            const [isLogin, setIsLogin] = useState(false);

            return (
                <div className="flex-grow flex items-center justify-center p-6">
                    <div className="glass p-8 rounded-3xl w-full max-w-md border border-white/10 shadow-2xl">
                        <div className="flex justify-center mb-6">
                            <img src={LOGO_IMG} alt="Logo" className="w-16 h-16 rounded-full border border-white/20 shadow-lg object-cover" />
                        </div>
                        <h2 className="text-2xl font-bold text-center text-white mb-2">{isLogin ? 'Welcome Back' : 'Join Eclipse AI'}</h2>
                        <p className="text-center text-eclipse-muted mb-8">{isLogin ? 'Log in to continue your learning journey.' : 'Start mastering math and science today.'}</p>
                        
                        {/* FIX: Google Login now correctly routes to Chat */}
                        <button type="button" onClick={() => setCurrentView('chat')} className="w-full flex items-center justify-center gap-3 glass py-3 rounded-xl hover:bg-white/5 transition-all mb-4 border border-white/10 font-medium">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Continue with Google
                        </button>

                        <div className="flex items-center gap-3 my-6">
                            <hr className="flex-grow border-white/10" />
                            <span className="text-xs text-eclipse-muted">OR</span>
                            <hr className="flex-grow border-white/10" />
                        </div>

                        <form onSubmit={(e) => { e.preventDefault(); setCurrentView('chat'); }} className="space-y-4">
                            <div>
                                <label className="block text-sm text-eclipse-muted mb-1">Email Address</label>
                                <input type="email" required className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="student@example.com" />
                            </div>
                            <div>
                                <label className="block text-sm text-eclipse-muted mb-1">Password</label>
                                <input type="password" required className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition-colors" placeholder="••••••••" />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-500 transition-all shadow-[0_0_15px_rgba(99,102,241,0.3)] mt-2">
                                {isLogin ? 'Log In' : 'Sign Up with Email'}
                            </button>
                        </form>
                        
                        <p className="text-center text-sm text-eclipse-muted mt-6">
                            {isLogin ? "Don't have an account? " : "Already have an account? "}
                            <span onClick={() => setIsLogin(!isLogin)} className="text-indigo-400 cursor-pointer hover:underline">{isLogin ? 'Sign up' : 'Log in'}</span>
                        </p>
                    </div>
                </div>
            );
        }

        // Chat View
        function ChatView({ setCurrentView }) {
            const [agent, setAgent] = useState('luna');
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // FIX: Real functional history state
            const createGreeting = (a) => ({
                role: 'ai', 
                agent: a,
                text: a === 'luna' 
                    ? "Hi, I'm Luna. I specialize in mathematical reasoning. What are you studying right now?" 
                    : "Hello, I'm Sol. I specialize in the sciences. What concepts can we explore today?"
            });

            const [conversations, setConversations] = useState([
                { id: 1, title: 'New Conversation', messages: [createGreeting('luna')] }
            ]);
            const [activeId, setActiveId] = useState(1);

            const activeConversation = conversations.find(c => c.id === activeId) || conversations[0];
            const messages = activeConversation.messages;

            // Auto-scroll
            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

            // Handle New Conversation
            const startNewConversation = () => {
                const newId = Date.now();
                setConversations([{ id: newId, title: 'New Conversation', messages: [createGreeting(agent)] }, ...conversations]);
                setActiveId(newId);
            };

            // Switch Agents
            const handleAgentSwitch = (newAgent) => {
                if (agent === newAgent) return;
                setAgent(newAgent);
                updateCurrentConversation([
                    ...messages,
                    { role: 'system', text: `Switched to ${newAgent === 'luna' ? 'Luna (Math Engine)' : 'Sol (Science Engine)'}` },
                    createGreeting(newAgent)
                ]);
            };

            const updateCurrentConversation = (newMessages, newTitle = null) => {
                setConversations(prev => prev.map(c => {
                    if (c.id === activeId) {
                        return { ...c, messages: newMessages, title: newTitle || c.title };
                    }
                    return c;
                }));
            };

            // Handle Submission
            const handleSubmit = (e) => {
                e.preventDefault();
                if (!inputText.trim()) return;

                const userText = inputText;
                const updatedMessages = [...messages, { role: 'user', text: userText }];
                
                // Set title if it's the first user message
                const newTitle = messages.length <= 2 ? userText.slice(0, 25) + "..." : activeConversation.title;
                
                updateCurrentConversation(updatedMessages, newTitle);
                setInputText('');
                setIsTyping(true);

                // Simulate AI
                setTimeout(() => {
                    let aiReply = agent === 'luna' 
                        ? "That's an interesting mathematical approach. Before we jump to the formula, let's break down the variables. What is your first step?" 
                        : "Great question. In scientific terms, we must consider the initial state of the system. How does energy transfer apply here?";
                    
                    updateCurrentConversation([...updatedMessages, { role: 'ai', agent: agent, text: aiReply }], newTitle);
                    setIsTyping(false);
                }, 1500);
            };

            return (
                <div className="flex flex-grow h-[calc(100vh-64px)] overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 glass hidden md:flex flex-col border-r border-eclipse-border relative">
                        <div className="p-4 border-b border-white/5">
                            <button onClick={startNewConversation} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-white transition-colors text-sm font-bold shadow-lg">
                                <Icon name="plus" size={16} /> New Conversation
                            </button>
                        </div>
                        
                        {/* FIX: Agent Switcher added to sidebar */}
                        <div className="px-4 mt-4 mb-2">
                            <p className="text-xs font-semibold text-eclipse-muted mb-2 uppercase tracking-wider">Active Agent</p>
                            <div className="flex bg-black/60 p-1 rounded-xl border border-white/5 shadow-inner">
                                <button 
                                    onClick={() => handleAgentSwitch('luna')} 
                                    className={`flex-1 py-1.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${agent === 'luna' ? 'bg-[#8B5CF6] text-white shadow-lg' : 'text-eclipse-muted hover:text-white'}`}
                                >
                                    <img src={LUNA_IMG} className="w-4 h-4 rounded-full" /> Luna
                                </button>
                                <button 
                                    onClick={() => handleAgentSwitch('sol')} 
                                    className={`flex-1 py-1.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${agent === 'sol' ? 'bg-[#EAB308] text-black shadow-lg' : 'text-eclipse-muted hover:text-white'}`}
                                >
                                    <img src={SOL_IMG} className="w-4 h-4 rounded-full" /> Sol
                                </button>
                            </div>
                        </div>

                        {/* FIX: Functional History */}
                        <div className="flex-grow overflow-y-auto px-3 pb-24">
                            <div className="text-xs font-semibold text-eclipse-muted mb-2 px-2 mt-4 uppercase tracking-wider">History</div>
                            {conversations.map(conv => (
                                <div 
                                    key={conv.id} 
                                    onClick={() => setActiveId(conv.id)}
                                    className={`truncate px-3 py-2 text-sm rounded-lg cursor-pointer transition-colors mb-1 ${activeId === conv.id ? 'bg-indigo-500/20 text-indigo-300' : 'text-eclipse-muted hover:bg-white/5 hover:text-white'}`}
                                >
                                    {conv.title}
                                </div>
                            ))}
                        </div>

                        {/* FIX: Added Upgrade Button to Sidebar */}
                        <div className="absolute bottom-0 w-full p-4 border-t border-white/5 bg-eclipse-surface/80 backdrop-blur">
                            <button onClick={() => setCurrentView('pricing')} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 glass border-indigo-500/30 hover:bg-indigo-500/10 rounded-xl text-indigo-300 transition-colors text-sm font-bold">
                                <Icon name="zap" size={16} /> Upgrade to Pro
                            </button>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-grow flex flex-col relative bg-eclipse-surface">
                        <div className="flex-grow overflow-y-auto p-6 pt-10 pb-32">
                            <div className="max-w-3xl mx-auto space-y-8">
                                {messages.map((msg, idx) => {
                                    if (msg.role === 'system') {
                                        return (
                                            <div key={idx} className="flex justify-center">
                                                <span className="text-xs bg-white/5 text-eclipse-muted px-3 py-1 rounded-full border border-white/10">{msg.text}</span>
                                            </div>
                                        );
                                    }
                                    const isUser = msg.role === 'user';
                                    const agentImage = msg.agent === 'luna' ? LUNA_IMG : SOL_IMG;
                                    const agentName = msg.agent === 'luna' ? 'Luna' : 'Sol';

                                    return (
                                        <div key={idx} className="flex gap-4">
                                            {isUser ? (
                                                <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center flex-shrink-0 text-white font-bold text-xs">U</div>
                                            ) : (
                                                <img src={agentImage} className="w-8 h-8 rounded-full object-cover flex-shrink-0 border border-white/10 shadow-lg" alt={agentName} />
                                            )}
                                            
                                            <div className="flex-grow">
                                                <p className="font-semibold text-white mb-1">{isUser ? 'You' : agentName}</p>
                                                <p className="text-eclipse-text leading-relaxed">{msg.text}</p>
                                            </div>
                                        </div>
                                    )
                                })}

                                {isTyping && (
                                    <div className="flex gap-4 opacity-70">
                                        <img src={agent === 'luna' ? LUNA_IMG : SOL_IMG} className="w-8 h-8 rounded-full object-cover flex-shrink-0 border border-white/10" alt="typing" />
                                        <div className="flex items-center gap-1">
                                            <div className="w-2 h-2 bg-eclipse-muted rounded-full animate-bounce"></div>
                                            <div className="w-2 h-2 bg-eclipse-muted rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                            <div className="w-2 h-2 bg-eclipse-muted rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>
                        </div>

                        <div className="absolute bottom-0 w-full bg-gradient-to-t from-eclipse-surface via-eclipse-surface to-transparent pt-10 pb-6 px-6">
                            <form onSubmit={handleSubmit} className="max-w-3xl mx-auto relative">
                                <input 
                                    type="text" 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={`Message ${agent === 'luna' ? 'Luna (Math)' : 'Sol (Science)'}...`} 
                                    className="w-full bg-black/80 border border-white/10 rounded-2xl py-4 pl-4 pr-14 text-white focus:outline-none focus:border-indigo-500 shadow-lg backdrop-blur-md transition-all"
                                />
                                <button type="submit" disabled={!inputText.trim()} className="absolute right-3 top-3 w-8 h-8 bg-white disabled:bg-white/20 text-black rounded-xl flex items-center justify-center transition-colors">
                                    <Icon name="arrow-up" size={18} />
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // Courses View
        function CoursesView() {
            // FIX: Added comprehensive High School courses, divided by Math/Science
            const mathCourses = [
                { title: "Algebra 1", desc: "Linear equations, inequalities, and functions.", diff: "Beginner" },
                { title: "Geometry", desc: "Proofs, theorems, and spatial reasoning.", diff: "Beginner" },
                { title: "Algebra 2", desc: "Polynomials, complex numbers, and logarithms.", diff: "Intermediate" },
                { title: "Precalculus", desc: "Trigonometry, vectors, and limits.", diff: "Intermediate" },
                { title: "AP Calculus AB", desc: "Derivatives and basic integration.", diff: "Advanced" },
                { title: "AP Calculus BC", desc: "Advanced integration, sequences, and series.", diff: "Advanced" },
                { title: "AP Statistics", desc: "Data analysis, probability, and inference.", diff: "Advanced" }
            ];

            const scienceCourses = [
                { title: "Earth Science", desc: "Geology, meteorology, and astronomy.", diff: "Beginner" },
                { title: "Biology", desc: "Cells, genetics, and ecology.", diff: "Beginner" },
                { title: "Chemistry", desc: "Atomic structure, reactions, and stoichiometry.", diff: "Intermediate" },
                { title: "Physics", desc: "Kinematics, forces, and energy.", diff: "Intermediate" },
                { title: "AP Biology", desc: "Advanced evolution and cellular processes.", diff: "Advanced" },
                { title: "AP Chemistry", desc: "Thermodynamics, kinetics, and equilibrium.", diff: "Advanced" },
                { title: "AP Physics 1 & 2", desc: "Algebra-based mechanics, electricity & magnetism.", diff: "Advanced" },
                { title: "AP Physics C", desc: "Calculus-based mechanics and E&M.", diff: "Advanced" }
            ];

            const renderCourseCard = (course, i) => (
                <div key={i} className="glass rounded-2xl p-6 flex flex-col border border-white/5 hover:border-indigo-500/30">
                    <div className="flex justify-between items-start mb-4">
                        <div className="text-xs font-semibold px-2 py-1 rounded bg-indigo-500/20 text-indigo-400">{course.diff}</div>
                    </div>
                    <h3 className="text-xl font-bold mb-2">{course.title}</h3>
                    <p className="text-sm text-eclipse-muted mb-6 flex-grow">{course.desc}</p>
                    <button className="w-full py-2.5 rounded-xl text-sm font-semibold bg-indigo-600 text-white hover:bg-indigo-700">Start Course</button>
                </div>
            );

            return (
                <div className="max-w-6xl mx-auto w-full p-6 pt-10 pb-20">
                    <h2 className="text-4xl font-bold mb-2">Curriculum</h2>
                    <p className="text-eclipse-muted mb-12">Comprehensive high school paths tailored to your level.</p>
                    
                    <div className="mb-16">
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-3 text-luna">
                            <Icon name="calculator" /> Mathematics (Luna)
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {mathCourses.map(renderCourseCard)}
                        </div>
                    </div>

                    <div>
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-3 text-sol">
                            <Icon name="microscope" /> Sciences (Sol)
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {scienceCourses.map(renderCourseCard)}
                        </div>
                    </div>
                </div>
            );
        }

        // Home View
        function HomeView({ setCurrentView }) {
            return (
                <div className="flex-grow flex flex-col items-center justify-center px-6 pb-20 text-center mt-20">
                    <div className="max-w-4xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 text-sm mb-8">
                            <Icon name="sparkles" size={14} />
                            <span>Introducing Advanced Reasoning Engine v2.0</span>
                        </div>
                        <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500">
                            Learn how to think,<br/>not what to memorize.
                        </h1>
                        <p className="text-lg md:text-xl text-eclipse-muted mb-10 max-w-2xl mx-auto leading-relaxed">
                            Eclipse AI is your personalized tutor, adaptive learning platform, and reasoning engine for mathematics and science.
                        </p>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-4 mb-20">
                            <button onClick={() => setCurrentView('chat')} className="w-full sm:w-auto px-8 py-4 rounded-full bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition-all shadow-[0_0_20px_rgba(99,102,241,0.3)] flex items-center justify-center gap-2">
                                Start Learning Free <Icon name="arrow-right" size={18} />
                            </button>
                            <button onClick={() => setCurrentView('courses')} className="w-full sm:w-auto px-8 py-4 rounded-full glass text-white font-semibold hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                                <Icon name="book-open" size={18} /> Explore Courses
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-6xl mx-auto w-full">
                        <FeatureCard icon="brain" title="Socratic Tutoring" desc="AI that teaches by asking the right questions, guiding you to the answer naturally." />
                        <FeatureCard icon="network" title="Concept Mapping" desc="Visualize how algorithms, formulas, and scientific laws connect to one another." />
                        <FeatureCard icon="target" title="Adaptive Practice" desc="Problems dynamically adjust to your skill level, ensuring you are always challenged." />
                    </div>
                </div>
            );
        }

        function FeatureCard({ icon, title, desc }) {
            return (
                <div className="glass p-6 rounded-2xl text-left hover:-translate-y-1 transition-transform cursor-pointer border border-white/5 hover:border-indigo-500/30">
                    <div className="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400 mb-4">
                        <Icon name={icon} size={24} />
                    </div>
                    <h3 className="text-xl font-semibold mb-2">{title}</h3>
                    <p className="text-eclipse-muted text-sm leading-relaxed">{desc}</p>
                </div>
            );
        }

        // Progress View
        function ProgressView() {
            return (
