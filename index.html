<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | Master High School Math & Science</title>
    
    <link rel="icon" id="favicon" type="image/jpeg" href="4.jpg">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eclipse: {
                            bg: '#030305',
                            surface: '#0A0A0F',
                            border: '#1F1F2E',
                            accent: '#6366F1',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                        }
                    },
                    animation: { 'ai-speak': 'speak 1.5s ease-in-out infinite' },
                    keyframes: {
                        speak: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(99, 102, 241, 0.2)' },
                            '50%': { boxShadow: '0 0 15px 5px rgba(99, 102, 241, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #030305; color: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1F1F2E; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .glass { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-glow { position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, rgba(0,0,0,0) 60%); border-radius: 50%; top: -200px; left: 50%; transform: translateX(-50%); pointer-events: none; z-index: -1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // USER IMAGE SETTINGS
        // ==========================================
        const LOGO_SRC = "4.jpg"; // Primary site logo / Favicon
        const LUNA_SRC = "3.jpg"; // Luna (Math) Profile Picture
        const SOL_SRC  = "4.jpg"; // Sol (Science) Profile Picture

        // ==========================================
        // CUSTOM HOOK: LOCAL STORAGE
        // ==========================================
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        // ==========================================
        // ICONS COMPONENT
        // ==========================================
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // ==========================================
        // CURRICULUM DATA
        // ==========================================
        const CURRICULUM = {
            math: [
                { id: 'm1', title: "Algebra 1", units: [{ title: "Unit 1: Linear Equations", days: 5 }, { title: "Unit 2: Functions & Graphs", days: 6 }, { title: "Unit 3: Quadratics", days: 7 }] },
                { id: 'm2', title: "Geometry", units: [{ title: "Unit 1: Foundations & Proofs", days: 5 }, { title: "Unit 2: Triangles & Congruence", days: 6 }, { title: "Unit 3: Circles & Volume", days: 5 }] },
                { id: 'm3', title: "Algebra 2", units: [{ title: "Unit 1: Polynomials", days: 6 }, { title: "Unit 2: Exponential & Logarithmic", days: 7 }, { title: "Unit 3: Trigonometry Basics", days: 5 }] },
                { id: 'm4', title: "Pre-Calculus", units: [{ title: "Unit 1: Advanced Trigonometry", days: 6 }, { title: "Unit 2: Conic Sections", days: 4 }, { title: "Unit 3: Limits Intro", days: 4 }] },
                { id: 'm5', title: "AP Calculus AB", units: [{ title: "Unit 1: Limits & Continuity", days: 5 }, { title: "Unit 2: Differentiation", days: 8 }, { title: "Unit 3: Integration", days: 8 }] },
                { id: 'm6', title: "AP Calculus BC", units: [{ title: "Unit 1: Advanced Integration", days: 6 }, { title: "Unit 2: Polar & Parametric", days: 5 }, { title: "Unit 3: Infinite Series", days: 8 }] },
                { id: 'm7', title: "AP Statistics", units: [{ title: "Unit 1: Data Exploration", days: 5 }, { title: "Unit 2: Probability", days: 6 }, { title: "Unit 3: Inference", days: 8 }] },
            ],
            science: [
                { id: 's1', title: "Earth Science", units: [{ title: "Unit 1: Geology", days: 5 }, { title: "Unit 2: Meteorology", days: 5 }, { title: "Unit 3: Astronomy", days: 6 }] },
                { id: 's2', title: "Biology", units: [{ title: "Unit 1: Cell Structure", days: 6 }, { title: "Unit 2: Genetics", days: 7 }, { title: "Unit 3: Evolution & Ecology", days: 6 }] },
                { id: 's3', title: "Chemistry", units: [{ title: "Unit 1: Atomic Structure", days: 5 }, { title: "Unit 2: Bonding & Reactions", days: 7 }, { title: "Unit 3: Stoichiometry", days: 6 }] },
                { id: 's4', title: "Physics", units: [{ title: "Unit 1: Kinematics", days: 6 }, { title: "Unit 2: Forces & Newton's Laws", days: 6 }, { title: "Unit 3: Energy & Momentum", days: 5 }] },
                { id: 's5', title: "AP Biology", units: [{ title: "Unit 1: Chemistry of Life", days: 4 }, { title: "Unit 2: Cellular Energetics", days: 7 }, { title: "Unit 3: Gene Expression", days: 8 }] },
                { id: 's6', title: "AP Chemistry", units: [{ title: "Unit 1: Intermolecular Forces", days: 6 }, { title: "Unit 2: Kinetics & Thermodynamics", days: 8 }, { title: "Unit 3: Equilibrium", days: 7 }] },
                { id: 's7', title: "AP Physics 1", units: [{ title: "Unit 1: 1D & 2D Motion", days: 5 }, { title: "Unit 2: Rotational Dynamics", days: 7 }, { title: "Unit 3: Simple Harmonic Motion", days: 4 }] },
            ]
        };

        // ==========================================
        // MAIN APP ROUTER
        // ==========================================
        function App() {
            const [currentView, setCurrentView] = useState('home');
            
            // Persistent State
            const [isLoggedIn, setIsLoggedIn] = useLocalStorage('eclipse_logged_in', false);
            const [apiKey, setApiKey] = useLocalStorage('eclipse_api_key', '');
            const [progress, setProgress] = useLocalStorage('eclipse_progress', {});
            
            // Isolated AI Histories
            const [lunaHistory, setLunaHistory] = useLocalStorage('eclipse_luna_history', []);
            const [solHistory, setSolHistory] = useLocalStorage('eclipse_sol_history', []);
            const [activeAgent, setActiveAgent] = useState('luna');

            // Set Favicon robustly
            useEffect(() => { document.getElementById('favicon').href = LOGO_SRC; }, []);

            const handleStartCourse = (agent, courseTitle) => {
                setActiveAgent(agent);
                const history = agent === 'luna' ? lunaHistory : solHistory;
                const setHistory = agent === 'luna' ? setLunaHistory : setSolHistory;

                const welcomeMessage = {
                    role: 'ai',
                    text: `Welcome to ${courseTitle}. Let's begin with Unit 1, Day 1. What is your current understanding of this topic?`
                };
                
                setHistory([...history, welcomeMessage]);
                setCurrentView('chat');
            };

            return (
                <div className="min-h-screen flex flex-col relative selection:bg-indigo-500/30">
                    <div className="hero-glow"></div>
                    
                    <Navbar 
                        currentView={currentView} setCurrentView={setCurrentView} 
                        isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn}
                    />
                    
                    <main className="flex-grow flex flex-col pt-16">
                        {currentView === 'home' && <HomeView setCurrentView={setCurrentView} isLoggedIn={isLoggedIn} />}
                        {currentView === 'chat' && (
                            <ChatView 
                                setCurrentView={setCurrentView}
                                lunaHistory={lunaHistory} setLunaHistory={setLunaHistory}
                                solHistory={solHistory} setSolHistory={setSolHistory}
                                activeAgent={activeAgent} setActiveAgent={setActiveAgent}
                                apiKey={apiKey}
                            />
                        )}
                        {currentView === 'courses' && <CoursesView onStartCourse={handleStartCourse} progress={progress} setProgress={setProgress} />}
                        {currentView === 'settings' && <SettingsView apiKey={apiKey} setApiKey={setApiKey} />}
                        {currentView === 'auth' && <AuthView setCurrentView={setCurrentView} setIsLoggedIn={setIsLoggedIn} />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // NAVBAR
        // ==========================================
        function Navbar({ currentView, setCurrentView, isLoggedIn, setIsLoggedIn }) {
            const navItems = ['Home', 'Courses'];
            if (isLoggedIn) navItems.push('Chat');
            
            return (
                <nav className="fixed top-0 w-full glass z-50 px-6 py-4 flex justify-between items-center border-b border-eclipse-border">
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentView('home')}>
                        <img src={LOGO_SRC} alt="Eclipse AI" className="w-8 h-8 rounded-lg object-cover" onError={(e)=>{e.target.style.display='none'}} />
                        <span className="text-xl font-bold tracking-tight text-white">Eclipse AI</span>
                    </div>
                    
                    <div className="hidden md:flex items-center gap-8 bg-black/40 px-6 py-2 rounded-full border border-white/5">
                        {navItems.map(item => (
                            <button 
                                key={item} onClick={() => setCurrentView(item.toLowerCase())}
                                className={`text-sm font-medium transition-all ${currentView === item.toLowerCase() ? 'text-indigo-400 drop-shadow-[0_0_8px_rgba(99,102,241,0.8)]' : 'text-eclipse-muted hover:text-white'}`}
                            >
                                {item}
                            </button>
                        ))}
                        {isLoggedIn && (
                            <button onClick={() => setCurrentView('settings')} className={`text-sm font-medium transition-all ${currentView === 'settings' ? 'text-indigo-400' : 'text-eclipse-muted hover:text-white'}`}>
                                Settings
                            </button>
                        )}
                    </div>

                    <div className="flex items-center gap-4">
                        {isLoggedIn ? (
                            <button onClick={() => {setIsLoggedIn(false); setCurrentView('home');}} className="text-sm font-medium text-eclipse-muted hover:text-white transition-colors">Sign Out</button>
                        ) : (
                            <button onClick={() => setCurrentView('auth')} className="text-sm font-semibold bg-white text-black px-5 py-2 rounded-full hover:bg-gray-200 transition-all">Sign Up / Log In</button>
                        )}
                    </div>
                </nav>
            );
        }

        // ==========================================
        // AUTHENTICATION VIEW
        // ==========================================
        function AuthView({ setCurrentView, setIsLoggedIn }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setIsLoggedIn(true); // Saves to localStorage automatically via hook
                setCurrentView('courses');
            };

            return (
                <div className="flex-grow flex items-center justify-center p-6 bg-eclipse-bg">
                    <div className="glass p-10 rounded-3xl w-full max-w-md border border-white/5 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>
                        <h2 className="text-3xl font-bold text-center text-white mb-2 mt-4">Initialize Session</h2>
                        <p className="text-center text-eclipse-muted mb-8 text-sm">Create an account or log in. Your data will be saved locally.</p>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 transition-all placeholder-gray-500" placeholder="Email address" />
                            </div>
                            <div>
                                <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 transition-all placeholder-gray-500" placeholder="Password" />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-500 transition-all shadow-[0_0_20px_rgba(99,102,241,0.2)] mt-4">
                                Enter Workspace
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // SETTINGS VIEW (API KEY INTEGRATION)
        // ==========================================
        function SettingsView({ apiKey, setApiKey }) {
            const [tempKey, setTempKey] = useState(apiKey);
            const [saved, setSaved] = useState(false);

            const handleSave = () => {
                setApiKey(tempKey);
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };

            return (
                <div className="max-w-3xl mx-auto w-full p-6 pt-12">
                    <h2 className="text-3xl font-bold mb-8 flex items-center gap-3"><Icon name="settings" /> System Settings</h2>
                    <div className="glass p-8 rounded-3xl border border-white/5">
                        <h3 className="text-xl font-bold mb-2">AI Engine Connection</h3>
                        <p className="text-eclipse-muted text-sm mb-6">To make Luna and Sol fully intelligent, enter a free Google Gemini API Key. Your key is stored securely in your browser's local storage and never sent anywhere except directly to Google.</p>
                        
                        <div className="flex gap-4">
                            <input 
                                type="password" 
                                value={tempKey} 
                                onChange={e => setTempKey(e.target.value)} 
                                placeholder="Paste Gemini API Key here (AIzaSy...)" 
                                className="flex-grow bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition-all font-mono text-sm"
                            />
                            <button onClick={handleSave} className="bg-indigo-600 px-6 py-3 rounded-xl font-bold hover:bg-indigo-500 transition-all text-white min-w-[120px]">
                                {saved ? 'Saved!' : 'Save Key'}
                            </button>
                        </div>
                        <p className="text-xs text-eclipse-muted mt-4">Don't have one? Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" className="text-indigo-400 hover:underline">Google AI Studio</a>.</p>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COURSES & PROGRESS TRACKER VIEW
        // ==========================================
        function CoursesView({ onStartCourse, progress, setProgress }) {
            const [expandedCourse, setExpandedCourse] = useState(null);

            const toggleDay = (courseId, unitIdx, dayIdx) => {
                const key = `${courseId}-u${unitIdx}-d${dayIdx}`;
                setProgress(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const calculateProgress = (course) => {
                let totalDays = 0;
                let completedDays = 0;
                course.units.forEach((unit, uIdx) => {
                    for(let d = 1; d <= unit.days; d++) {
                        totalDays++;
                        if (progress[`${course.id}-u${uIdx}-d${d}`]) completedDays++;
                    }
                });
                return totalDays === 0 ? 0 : Math.round((completedDays / totalDays) * 100);
            };

            const CourseCard = ({ course, agent, agentColor }) => {
                const isExpanded = expandedCourse === course.id;
                const percent = calculateProgress(course);

                return (
                    <div className="glass rounded-2xl border border-white/5 overflow-hidden transition-all mb-4">
                        <div 
                            className="p-6 cursor-pointer flex items-center justify-between hover:bg-white/5 transition-colors"
                            onClick={() => setExpandedCourse(isExpanded ? null : course.id)}
                        >
                            <div>
                                <h3 className="text-xl font-bold mb-2">{course.title}</h3>
                                <div className="flex items-center gap-4">
                                    <div className="w-48 h-2 bg-black/50 rounded-full overflow-hidden">
                                        <div className={`h-full ${agentColor} transition-all duration-500`} style={{width: `${percent}%`}}></div>
                                    </div>
                                    <span className="text-xs text-eclipse-muted font-mono">{percent}% Complete</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onStartCourse(agent, course.title); }} 
                                    className="px-4 py-2 rounded-lg text-sm font-bold bg-white/10 hover:bg-white/20 text-white transition-colors"
                                >
                                    Chat with {agent === 'luna' ? 'Luna' : 'Sol'}
                                </button>
                                <Icon name={isExpanded ? 'chevron-up' : 'chevron-down'} className="text-eclipse-muted" />
                            </div>
                        </div>

                        {isExpanded && (
                            <div className="bg-black/30 p-6 border-t border-white/5">
                                {course.units.map((unit, uIdx) => (
                                    <div key={uIdx} className="mb-6 last:mb-0">
                                        <h4 className="text-sm font-bold text-eclipse-muted uppercase tracking-wider mb-3">{unit.title}</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {Array.from({length: unit.days}).map((_, dIdx) => {
                                                const dayNum = dIdx + 1;
                                                const isDone = progress[`${course.id}-u${uIdx}-d${dayNum}`];
                                                return (
                                                    <button 
                                                        key={dIdx}
                                                        onClick={() => toggleDay(course.id, uIdx, dayNum)}
                                                        className={`w-10 h-10 rounded-lg flex items-center justify-center text-sm font-medium transition-all ${isDone ? agentColor + ' text-white shadow-lg shadow-current/20' : 'bg-white/5 text-eclipse-muted hover:bg-white/10'}`}
                                                    >
                                                        {dayNum}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="max-w-5xl mx-auto w-full p-6 pt-12 pb-24">
                    <h2 className="text-4xl font-bold mb-3">High School Curriculum Tracker</h2>
                    <p className="text-eclipse-muted mb-12 text-lg">Your progress is automatically saved to your local workspace.</p>
                    
                    <div className="mb-16">
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-3 text-purple-400 border-b border-white/10 pb-4">
                            <Icon name="calculator" /> Mathematics (Luna)
                        </h3>
                        {CURRICULUM.math.map(c => <CourseCard key={c.id} course={c} agent="luna" agentColor="bg-purple-500" />)}
                    </div>

                    <div>
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-3 text-yellow-400 border-b border-white/10 pb-4">
                            <Icon name="microscope" /> Sciences (Sol)
                        </h3>
                        {CURRICULUM.science.map(c => <CourseCard key={c.id} course={c} agent="sol" agentColor="bg-yellow-500" />)}
                    </div>
                </div>
            );
        }

        // ==========================================
        // CHAT VIEW (REAL AI INTEGRATION)
        // ==========================================
        function ChatView({ setCurrentView, lunaHistory, setLunaHistory, solHistory, setSolHistory, activeAgent, setActiveAgent, apiKey }) {
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const messages = activeAgent === 'luna' ? lunaHistory : solHistory;
            const setMessages = activeAgent === 'luna' ? setLunaHistory : setSolHistory;

            useEffect(() => {
                if (messages.length === 0) {
                    setMessages([{
                        role: 'ai',
                        text: activeAgent === 'luna' 
                            ? "Hi, I'm Luna. I specialize in pure mathematics and logic. What are we studying?"
                            : "Hello, I'm Sol. I specialize in the natural sciences and physics. Where should we begin?"
                    }]);
                }
            }, [activeAgent]);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, isTyping]);

            const callGeminiAPI = async (userText, currentHistory) => {
                if (!apiKey) {
                    return "System Alert: No Gemini API Key detected. Please go to the Settings tab to enter your key so I can process your request.";
                }

                // Format history for Gemini
                const formattedHistory = currentHistory.map(msg => ({
                    role: msg.role === 'ai' ? 'model' : 'user',
                    parts: [{ text: msg.text }]
                }));
                
                // Add the new user message
                formattedHistory.push({ role: 'user', parts: [{ text: userText }] });

                // Add System Instruction based on agent
                const systemPrompt = activeAgent === 'luna' 
                    ? "You are Luna, an uncompromising, brilliant tutor specializing in High School Mathematics. You do not just give answers; you force the user to think and understand the mechanics. Keep formatting clean."
                    : "You are Sol, a brilliant tutor specializing in High School Sciences (Physics, Biology, Chemistry). You guide students through scientific reasoning. Keep formatting clean.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: formattedHistory
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    console.error("API Error:", error);
                    return `System Error: Failed to communicate with the neural network. (${error.message})`;
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputText.trim()) return;

                const userText = inputText;
                const newHistory = [...messages, { role: 'user', text: userText }];
                
                setMessages(newHistory);
                setInputText('');
                setIsTyping(true);

                // Fetch real AI response
                const aiResponseText = await callGeminiAPI(userText, messages);
                
                setMessages([...newHistory, { role: 'ai', text: aiResponseText }]);
                setIsTyping(false);
            };

            const currentAgentImage = activeAgent === 'luna' ? LUNA_SRC : SOL_SRC;

            return (
                <div className="flex flex-grow h-[calc(100vh-64px)] overflow-hidden bg-eclipse-bg">
                    {/* Sidebar */}
                    <div className="w-72 glass hidden md:flex flex-col border-r border-eclipse-border z-10">
                        <div className="p-4 border-b border-white/5">
                            <p className="text-[10px] font-bold text-eclipse-muted mb-3 uppercase tracking-widest px-1">Active AI Engine</p>
                            <div className="flex bg-black/50 p-1.5 rounded-xl border border-white/5">
                                <button onClick={() => setActiveAgent('luna')} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${activeAgent === 'luna' ? 'bg-gradient-to-br from-purple-600 to-indigo-600 text-white shadow-lg' : 'text-eclipse-muted hover:text-white hover:bg-white/5'}`}>
                                    Luna
                                </button>
                                <button onClick={() => setActiveAgent('sol')} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${activeAgent === 'sol' ? 'bg-gradient-to-br from-yellow-500 to-orange-500 text-white shadow-lg' : 'text-eclipse-muted hover:text-white hover:bg-white/5'}`}>
                                    Sol
                                </button>
                            </div>
                        </div>
                        <div className="flex-grow p-4 space-y-2">
                            <button onClick={() => setMessages([])} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-white bg-white/5 hover:bg-white/10 transition-colors border border-white/5">
                                <Icon name="rotate-ccw" size={18} className={activeAgent === 'luna' ? "text-purple-400" : "text-yellow-400"} /> Clear Memory
                            </button>
                            <button onClick={() => setCurrentView('courses')} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-eclipse-muted hover:text-white hover:bg-white/5 transition-colors">
                                <Icon name="book-open" size={18} /> Course Tracker
                            </button>
                            <button onClick={() => setCurrentView('settings')} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-eclipse-muted hover:text-white hover:bg-white/5 transition-colors">
                                <Icon name="key" size={18} /> API Settings
                            </button>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-grow flex flex-col relative">
                        <div className="flex-grow overflow-y-auto p-6 pt-8 pb-32">
                            <div className="max-w-4xl mx-auto space-y-8">
                                {messages.map((msg, idx) => {
                                    const isUser = msg.role === 'user';
                                    return (
                                        <div key={idx} className={`flex gap-5 ${isUser ? 'flex-row-reverse' : ''}`}>
                                            <div className="flex-shrink-0">
                                                {isUser ? (
                                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-gray-700 to-gray-900 flex items-center justify-center text-white font-bold text-sm border border-white/10 shadow-lg">U</div>
                                                ) : (
                                                    <img src={currentAgentImage} className="w-10 h-10 rounded-xl object-cover border border-white/10 shadow-lg bg-black" alt="AI" onError={(e)=>{e.target.style.display='none'}} />
                                                )}
                                            </div>
                                            <div className={`flex flex-col ${isUser ? 'items-end' : 'items-start'} max-w-[85%]`}>
                                                <p className="text-xs text-eclipse-muted mb-1 px-1">{isUser ? 'You' : (activeAgent === 'luna' ? 'Luna' : 'Sol')}</p>
                                                <div className={`p-4 rounded-2xl ${isUser ? 'bg-indigo-600 text-white rounded-tr-sm' : 'glass border-white/5 text-eclipse-text rounded-tl-sm'}`}>
                                                    {/* Basic Markdown parsing for bold text provided by API */}
                                                    <p className="leading-relaxed whitespace-pre-wrap" dangerouslySetInnerHTML={{__html: msg.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}}></p>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })}

                                {isTyping && (
                                    <div className="flex gap-5">
                                        <div className="flex-shrink-0">
                                            <img src={currentAgentImage} className="w-10 h-10 rounded-xl object-cover border-2 border-indigo-500 animate-ai-speak bg-black" alt="AI Typing" onError={(e)=>{e.target.style.display='none'}} />
                                        </div>
                                        <div className="flex flex-col items-start">
                                            <div className="p-4 rounded-2xl glass border-white/5 rounded-tl-sm flex items-center gap-2 h-[56px] mt-5">
                                                <div className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
                                                <div className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                                <div className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} className="h-4" />
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="absolute bottom-0 w-full bg-gradient-to-t from-eclipse-bg via-eclipse-bg to-transparent pt-12 pb-8 px-6">
                            <form onSubmit={handleSubmit} className="max-w-4xl mx-auto relative group">
                                <input 
                                    type="text" value={inputText} onChange={(e) => setInputText(e.target.value)}
                                    placeholder={`Ask ${activeAgent === 'luna' ? 'Luna' : 'Sol'} anything...`} 
                                    className="w-full bg-black/60 border border-white/10 group-hover:border-white/20 rounded-2xl py-4 pl-6 pr-16 text-white focus:outline-none focus:border-indigo-500 shadow-xl backdrop-blur-xl transition-all"
                                />
                                <button type="submit" disabled={!inputText.trim() || isTyping} className="absolute right-3 top-3 bottom-3 aspect-square bg-indigo-600 disabled:bg-white/10 text-white disabled:text-white/30 rounded-xl flex items-center justify-center transition-all hover:bg-indigo-500">
                                    <Icon name="send" size={18} />
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // HOME VIEW
        // ==========================================
        function HomeView({ setCurrentView, isLoggedIn }) {
            return (
                <div className="flex-grow flex flex-col items-center justify-center px-6 pb-20 text-center mt-12 relative">
                    <div className="max-w-5xl mx-auto relative z-10">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-eclipse-muted text-sm mb-8 backdrop-blur-md">
                            <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span> Dynamic API Integration Live
                        </div>
                        <h1 className="text-6xl md:text-8xl font-extrabold tracking-tighter mb-6 text-transparent bg-clip-text bg-gradient-to-br from-white via-gray-200 to-gray-600 drop-shadow-sm">
                            Master the complex.
                        </h1>
                        <p className="text-lg md:text-xl text-eclipse-muted mb-12 max-w-2xl mx-auto leading-relaxed">
                            Eclipse AI is an uncompromising reasoning engine designed to force you to think, adapt, and conquer high-level mathematics and science.
                        </p>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-5 mb-24">
                            <button onClick={() => setCurrentView(isLoggedIn ? 'courses' : 'auth')} className="w-full sm:w-auto px-8 py-4 rounded-xl bg-white text-black font-bold hover:bg-gray-200 transition-all flex items-center justify-center gap-2 text-lg">
                                {isLoggedIn ? 'Open Tracker' : 'Start Learning'} <Icon name="arrow-right" size={20} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
