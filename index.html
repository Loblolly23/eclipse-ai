<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI</title>
    <link rel="icon" type="image/jpeg" href="2.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Modern Dark Mode Palette */
        body { background-color: #0a0a0c; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(25, 25, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .sidebar-item { transition: all 0.2s ease; }
        .sidebar-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <aside class="w-64 border-r border-white/10 p-6 flex flex-col gap-8">
            <div class="flex items-center gap-3 font-bold text-xl tracking-tight">
                <img src="2.jpg" alt="Logo" class="w-8 h-8 rounded-full">
                Eclipse
            </div>
            <nav class="space-y-2 text-sm text-gray-400">
                <a href="#" class="sidebar-item flex items-center gap-3 p-3 rounded-lg"><i data-lucide="database" size="18"></i> Knowledge Vault</a>
                <a href="#" class="sidebar-item flex items-center gap-3 p-3 rounded-lg"><i data-lucide="bar-chart-2" size="18"></i> Progress</a>
                <a href="#" class="sidebar-item flex items-center gap-3 p-3 rounded-lg"><i data-lucide="settings" size="18"></i> Settings</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-16 border-b border-white/10 flex items-center justify-between px-8">
                <div class="flex gap-2 bg-black/40 p-1 rounded-xl border border-white/5">
                    <button id="lunaBtn" class="px-5 py-1.5 rounded-lg text-sm font-semibold bg-indigo-600 text-white shadow-lg">
                        <img src="3.jpg" class="w-4 h-4 inline mr-2 rounded-full"> Luna
                    </button>
                    <button id="solBtn" class="px-5 py-1.5 rounded-lg text-sm font-semibold text-gray-400 hover:text-white">
                        <img src="4.jpg" class="w-4 h-4 inline mr-2 rounded-full"> Sol
                    </button>
                </div>
                <button class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold uppercase tracking-wider hover:bg-gray-200 transition">Sign Up</button>
            </header>

            <section class="flex-1 flex items-center justify-center p-8">
                <div class="w-full max-w-xl glass p-8 rounded-3xl shadow-2xl">
                    <h2 id="title" class="text-2xl font-bold mb-6">Luna Math Engine</h2>
                    <textarea class="w-full h-48 bg-black/30 border border-white/10 rounded-2xl p-5 text-sm focus:border-indigo-500 outline-none transition" placeholder="How can I assist your learning journey?"></textarea>
                    <button class="w-full mt-6 bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-500 transition shadow-indigo-500/20 shadow-lg">Process Request</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        // Simple Toggle Logic
        const lunaBtn = document.getElementById('lunaBtn');
        const solBtn = document.getElementById('solBtn');
        const title = document.getElementById('title');
        
        lunaBtn.onclick = () => { title.innerText = 'Luna Math Engine'; };
        solBtn.onclick = () => { title.innerText = 'Sol Science Engine'; };
    </script>
</body>
</html>
