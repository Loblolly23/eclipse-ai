<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | Learn How To Think</title>
    
    <link rel="icon" id="favicon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eclipse: {
                            bg: '#030305',
                            surface: '#0A0A0F',
                            border: '#1F1F2E',
                            accent: '#6366F1',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                        }
                    },
                    animation: {
                        'ai-speak': 'speak 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        speak: {
                            '0%, 100%': { boxShadow: '0 0 0 0 rgba(99, 102, 241, 0.4)' },
                            '50%': { boxShadow: '0 0 15px 5px rgba(99, 102, 241, 0.8)' },
                        }
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #030305;
            color: #F8FAFC;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1F1F2E; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .glass {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .hero-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, rgba(0,0,0,0) 60%);
            border-radius: 50%;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. USER IMAGE SETTINGS (CHANGE THESE!)
        // ==========================================
        // Put your images in the same folder as this HTML file.
        // Change these strings to exactly match your file names (e.g., '2.jpg').
        const LOGO_SRC = "https://ui-avatars.com/api/?name=E+AI&background=0A0A0F&color=fff"; // Change to 'your-logo.jpg'
        const LUNA_SRC = "https://ui-avatars.com/api/?name=L&background=8B5CF6&color=fff"; // Change to 'luna-image.jpg'
        const SOL_SRC  = "https://ui-avatars.com/api/?name=S&background=EAB308&color=000"; // Change to 'sol-image.jpg'

        // Set Favicon dynamically
        document.getElementById('favicon').href = LOGO_SRC;

        // ==========================================
        // 2. ICONS COMPONENT
        // ==========================================
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // ==========================================
        // 3. MAIN APP ROUTER
        // ==========================================
        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            
            // Isolated Histories for Agents
            const [lunaHistory, setLunaHistory] = useState([]);
            const [solHistory, setSolHistory] = useState([]);
            const [activeAgent, setActiveAgent] = useState('luna');

            // Course Start Handler
            const handleStartCourse = (agent, courseTitle) => {
                setActiveAgent(agent);
                const welcomeMessage = {
                    role: 'ai',
                    text: `Welcome to ${courseTitle}! Let's begin with Unit 1, Day 1. I am ready to guide you through this material step-by-step. What do you already know about this subject?`
                };
                
                if (agent === 'luna') {
                    setLunaHistory([welcomeMessage]);
                } else {
                    setSolHistory([welcomeMessage]);
                }
                setCurrentView('chat');
            };

            return (
                <div className="min-h-screen flex flex-col relative selection:bg-indigo-500/30">
                    <div className="hero-glow"></div>
                    
                    <Navbar 
                        currentView={currentView} 
                        setCurrentView={setCurrentView} 
                        isLoggedIn={isLoggedIn}
                        setIsLoggedIn={setIsLoggedIn}
                    />
                    
                    <main className="flex-grow flex flex-col pt-16">
                        {currentView === 'home' && <HomeView setCurrentView={setCurrentView} isLoggedIn={isLoggedIn} />}
                        {currentView === 'chat' && (
                            <ChatView 
                                setCurrentView={setCurrentView}
                                lunaHistory={lunaHistory} setLunaHistory={setLunaHistory}
                                solHistory={solHistory} setSolHistory={setSolHistory}
                                activeAgent={activeAgent} setActiveAgent={setActiveAgent}
                            />
                        )}
                        {currentView === 'courses' && <CoursesView onStartCourse={handleStartCourse} />}
                        {currentView === 'practice' && <PracticeView />}
                        {currentView === 'auth' && <AuthView setCurrentView={setCurrentView} setIsLoggedIn={setIsLoggedIn} />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 4. NAVBAR
        // ==========================================
        function Navbar({ currentView, setCurrentView, isLoggedIn, setIsLoggedIn }) {
            const navItems = ['Home', 'Courses', 'Practice'];
            if (isLoggedIn) navItems.splice(1, 0, 'Chat'); // Insert Chat if logged in
            
            return (
                <nav className="fixed top-0 w-full glass z-50 px-6 py-4 flex justify-between items-center border-b border-eclipse-border">
                    <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentView('home')}>
                        <img src={LOGO_SRC} alt="Eclipse AI" className="w-8 h-8 rounded-lg object-cover" />
                        <span className="text-xl font-bold tracking-tight text-white">Eclipse AI</span>
                    </div>
                    
                    <div className="hidden md:flex items-center gap-8 bg-black/40 px-6 py-2 rounded-full border border-white/5">
                        {navItems.map(item => (
                            <button 
                                key={item}
                                onClick={() => setCurrentView(item.toLowerCase())}
                                className={`text-sm font-medium transition-all ${currentView === item.toLowerCase() ? 'text-indigo-400 drop-shadow-[0_0_8px_rgba(99,102,241,0.8)]' : 'text-eclipse-muted hover:text-white'}`}
                            >
                                {item}
                            </button>
                        ))}
                    </div>

                    <div className="flex items-center gap-4">
                        {isLoggedIn ? (
                            <button onClick={() => {setIsLoggedIn(false); setCurrentView('home');}} className="text-sm font-medium text-eclipse-muted hover:text-white transition-colors">Sign Out</button>
                        ) : (
                            <>
                                <button onClick={() => setCurrentView('auth')} className="text-sm font-medium text-eclipse-muted hover:text-white transition-colors">Log In</button>
                                <button onClick={() => setCurrentView('auth')} className="text-sm font-semibold bg-white text-black px-5 py-2 rounded-full hover:bg-gray-200 transition-all">Sign Up</button>
                            </>
                        )}
                    </div>
                </nav>
            );
        }

        // ==========================================
        // 5. AUTHENTICATION VIEW
        // ==========================================
        function AuthView({ setCurrentView, setIsLoggedIn }) {
            const [isLogin, setIsLogin] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                // Simulate real login success
                setIsLoggedIn(true);
                setCurrentView('chat');
            };

            return (
                <div className="flex-grow flex items-center justify-center p-6 bg-eclipse-bg">
                    <div className="glass p-10 rounded-3xl w-full max-w-md border border-white/5 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>
                        
                        <div className="flex justify-center mb-6">
                            <img src={LOGO_SRC} alt="Logo" className="w-16 h-16 rounded-2xl shadow-lg object-cover" />
                        </div>
                        <h2 className="text-3xl font-bold text-center text-white mb-2">{isLogin ? 'Welcome Back' : 'Create Account'}</h2>
                        <p className="text-center text-eclipse-muted mb-8 text-sm">{isLogin ? 'Enter your details to continue.' : 'Join the most advanced learning engine.'}</p>
                        
                        <button type="button" onClick={handleSubmit} className="w-full flex items-center justify-center gap-3 bg-white/5 py-3.5 rounded-xl hover:bg-white/10 transition-all mb-6 border border-white/10 font-medium">
                            <svg className="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                            Continue with Google
                        </button>

                        <div className="flex items-center gap-3 mb-6">
                            <hr className="flex-grow border-white/5" />
                            <span className="text-xs text-eclipse-muted uppercase font-bold tracking-widest">or</span>
                            <hr className="flex-grow border-white/5" />
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-gray-600" placeholder="Email address" />
                            </div>
                            <div>
                                <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-gray-600" placeholder="Password" />
                            </div>
                            <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-500 transition-all shadow-[0_0_20px_rgba(99,102,241,0.2)] mt-4">
                                {isLogin ? 'Log In' : 'Create Account'}
                            </button>
                        </form>
                        
                        <p className="text-center text-sm text-eclipse-muted mt-8">
                            {isLogin ? "Don't have an account? " : "Already have an account? "}
                            <span onClick={() => setIsLogin(!isLogin)} className="text-indigo-400 cursor-pointer hover:text-indigo-300 font-semibold">{isLogin ? 'Sign up' : 'Log in'}</span>
                        </p>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. CHAT VIEW
        // ==========================================
        function ChatView({ setCurrentView, lunaHistory, setLunaHistory, solHistory, setSolHistory, activeAgent, setActiveAgent }) {
            const [inputText, setInputText] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            // Determine which history to show based on active agent
            const messages = activeAgent === 'luna' ? lunaHistory : solHistory;
            const setMessages = activeAgent === 'luna' ? setLunaHistory : setSolHistory;

            // Initialize empty history with greeting
            useEffect(() => {
                if (messages.length === 0) {
                    setMessages([{
                        role: 'ai',
                        text: activeAgent === 'luna' 
                            ? "Hi, I'm Luna. Let's tackle some mathematics. What topic are we diving into today?"
                            : "Hello, I'm Sol. I'm ready to explore the sciences with you. Where should we begin?"
                    }]);
                }
            }, [activeAgent, messages, setMessages]);

            // Auto-scroll robustly
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!inputText.trim()) return;

                const userMsg = { role: 'user', text: inputText };
                setMessages([...messages, userMsg]);
                setInputText('');
                setIsTyping(true);

                // Simulate highly compliant AI
                setTimeout(() => {
                    const aiReply = {
                        role: 'ai',
                        text: `Absolutely, I can help you with that right now. Here is the step-by-step breakdown to ensure you understand it perfectly...`
                    };
                    setMessages(prev => [...prev, aiReply]);
                    setIsTyping(false);
                }, 1500);
            };

            const clearCurrentChat = () => {
                setMessages([]);
            };

            const currentAgentImage = activeAgent === 'luna' ? LUNA_SRC : SOL_SRC;

            return (
                <div className="flex flex-grow h-[calc(100vh-64px)] overflow-hidden bg-eclipse-bg">
                    {/* Enhanced Sidebar */}
                    <div className="w-72 glass hidden md:flex flex-col border-r border-eclipse-border z-10">
                        {/* Agent Switcher - Complete Tab Isolation */}
                        <div className="p-4 border-b border-white/5">
                            <p className="text-[10px] font-bold text-eclipse-muted mb-3 uppercase tracking-widest px-1">AI Engine</p>
                            <div className="flex bg-black/50 p-1.5 rounded-xl border border-white/5">
                                <button 
                                    onClick={() => setActiveAgent('luna')} 
                                    className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${activeAgent === 'luna' ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-lg' : 'text-eclipse-muted hover:text-white hover:bg-white/5'}`}
                                >
                                    <img src={LUNA_SRC} className="w-5 h-5 rounded-full object-cover" /> Luna
                                </button>
                                <button 
                                    onClick={() => setActiveAgent('sol')} 
                                    className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${activeAgent === 'sol' ? 'bg-gradient-to-r from-yellow-600 to-orange-600 text-white shadow-lg' : 'text-eclipse-muted hover:text-white hover:bg-white/5'}`}
                                >
                                    <img src={SOL_SRC} className="w-5 h-5 rounded-full object-cover" /> Sol
                                </button>
                            </div>
                        </div>

                        {/* Navigation Buttons */}
                        <div className="flex-grow p-4 space-y-2 overflow-y-auto">
                            <p className="text-[10px] font-bold text-eclipse-muted mb-3 uppercase tracking-widest px-1 mt-2">Workspace</p>
                            
                            <button onClick={clearCurrentChat} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-white bg-white/5 hover:bg-white/10 transition-colors border border-white/5">
                                <Icon name="plus-circle" size={18} className="text-indigo-400" /> New Chat
                            </button>
                            
                            <button onClick={() => setCurrentView('courses')} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-eclipse-muted hover:text-white hover:bg-white/5 transition-colors">
                                <Icon name="book-open" size={18} /> View Courses
                            </button>

                            <button onClick={() => setCurrentView('practice')} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-eclipse-muted hover:text-white hover:bg-white/5 transition-colors">
                                <Icon name="pen-tool" size={18} /> Practice Problems
                            </button>
                            
                            <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-eclipse-muted hover:text-white hover:bg-white/5 transition-colors">
                                <Icon name="settings" size={18} /> Settings
                            </button>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-grow flex flex-col relative">
                        <div className="flex-grow overflow-y-auto p-6 pt-8 pb-32">
                            <div className="max-w-4xl mx-auto space-y-8">
                                {messages.map((msg, idx) => {
                                    const isUser = msg.role === 'user';
                                    return (
                                        <div key={idx} className={`flex gap-5 ${isUser ? 'flex-row-reverse' : ''}`}>
                                            {/* Avatar */}
                                            <div className="flex-shrink-0">
                                                {isUser ? (
                                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-gray-700 to-gray-900 flex items-center justify-center text-white font-bold text-sm border border-white/10 shadow-lg">U</div>
                                                ) : (
                                                    <img src={currentAgentImage} className="w-10 h-10 rounded-xl object-cover border border-white/10 shadow-lg" alt="AI" />
                                                )}
                                            </div>
                                            
                                            {/* Message Bubble */}
                                            <div className={`flex flex-col ${isUser ? 'items-end' : 'items-start'} max-w-[80%]`}>
                                                <p className="text-xs text-eclipse-muted mb-1 px-1">{isUser ? 'You' : (activeAgent === 'luna' ? 'Luna' : 'Sol')}</p>
                                                <div className={`p-4 rounded-2xl ${isUser ? 'bg-indigo-600 text-white rounded-tr-sm' : 'glass border-white/5 text-eclipse-text rounded-tl-sm'}`}>
                                                    <p className="leading-relaxed whitespace-pre-wrap">{msg.text}</p>
                                                </div>
                                            </div>
                                        </div>
                                    )
                                })}

                                {/* Typing Animation */}
                                {isTyping && (
                                    <div className="flex gap-5">
                                        <div className="flex-shrink-0">
                                            <img src={currentAgentImage} className="w-10 h-10 rounded-xl object-cover border-2 border-indigo-500 animate-ai-speak" alt="AI Typing" />
                                        </div>
                                        <div className="flex flex-col items-start">
                                            <p className="text-xs text-eclipse-muted mb-1 px-1">{activeAgent === 'luna' ? 'Luna' : 'Sol'} is thinking...</p>
                                            <div className="p-4 rounded-2xl glass border-white/5 rounded-tl-sm flex items-center gap-2 h-[56px]">
                                                <div className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></div>
                                                <div className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></div>
                                                <div className="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} className="h-4" />
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="absolute bottom-0 w-full bg-gradient-to-t from-eclipse-bg via-eclipse-bg to-transparent pt-12 pb-8 px-6">
                            <form onSubmit={handleSubmit} className="max-w-4xl mx-auto relative group">
                                <input 
                                    type="text" 
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    placeholder={`Ask ${activeAgent === 'luna' ? 'Luna' : 'Sol'} anything...`} 
                                    className="w-full bg-black/60 border border-white/10 group-hover:border-white/20 rounded-2xl py-4 pl-6 pr-16 text-white focus:outline-none focus:border-indigo-500 shadow-xl backdrop-blur-xl transition-all"
                                />
                                <button type="submit" disabled={!inputText.trim()} className="absolute right-3 top-3 bottom-3 aspect-square bg-indigo-600 disabled:bg-white/10 text-white disabled:text-white/30 rounded-xl flex items-center justify-center transition-all hover:bg-indigo-500">
                                    <Icon name="send" size={18} />
                                </button>
                            </form>
                            <p className="text-center text-[10px] text-eclipse-muted mt-3">AI agents are programmed to be relentlessly helpful. Verify complex calculations.</p>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 7. COURSES VIEW
        // ==========================================
        function CoursesView({ onStartCourse }) {
            const mathCourses = [
                { title: "Algebra 1", desc: "Linear equations, inequalities.", diff: "Beginner" },
                { title: "AP Calculus AB", desc: "Derivatives and integration.", diff: "Advanced" },
            ];

            const scienceCourses = [
                { title: "Biology", desc: "Cells, genetics, ecology.", diff: "Beginner" },
                { title: "AP Physics C", desc: "Calculus-based mechanics.", diff: "Advanced" }
            ];

            return (
                <div className="max-w-6xl mx-auto w-full p-6 pt-12 pb-24">
                    <h2 className="text-4xl font-bold mb-3">Curriculum</h2>
                    <p className="text-eclipse-muted mb-12 text-lg">Select a course. Your specialized AI will automatically load Unit 1, Day 1.</p>
                    
                    <div className="mb-16">
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-3 text-purple-400">
                            <Icon name="calculator" /> Mathematics (Luna Engine)
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {mathCourses.map((c, i) => (
                                <div key={i} className="glass rounded-2xl p-6 flex flex-col border border-white/5 hover:border-purple-500/30 transition-all hover:-translate-y-1">
                                    <div className="text-[10px] font-bold px-2 py-1 rounded bg-purple-500/20 text-purple-300 w-max mb-4 uppercase">{c.diff}</div>
                                    <h3 className="text-xl font-bold mb-2">{c.title}</h3>
                                    <p className="text-sm text-eclipse-muted mb-8 flex-grow">{c.desc}</p>
                                    <button onClick={() => onStartCourse('luna', c.title)} className="w-full py-3 rounded-xl text-sm font-bold bg-white/5 hover:bg-purple-600 text-white transition-colors border border-white/10 hover:border-transparent">Start Course</button>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div>
                        <h3 className="text-2xl font-bold mb-6 flex items-center gap-3 text-yellow-400">
                            <Icon name="microscope" /> Sciences (Sol Engine)
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {scienceCourses.map((c, i) => (
                                <div key={i} className="glass rounded-2xl p-6 flex flex-col border border-white/5 hover:border-yellow-500/30 transition-all hover:-translate-y-1">
                                    <div className="text-[10px] font-bold px-2 py-1 rounded bg-yellow-500/20 text-yellow-300 w-max mb-4 uppercase">{c.diff}</div>
                                    <h3 className="text-xl font-bold mb-2">{c.title}</h3>
                                    <p className="text-sm text-eclipse-muted mb-8 flex-grow">{c.desc}</p>
                                    <button onClick={() => onStartCourse('sol', c.title)} className="w-full py-3 rounded-xl text-sm font-bold bg-white/5 hover:bg-yellow-600 text-white transition-colors border border-white/10 hover:border-transparent">Start Course</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 8. PRACTICE VIEW (NEW)
        // ==========================================
        function PracticeView() {
            const [selected, setSelected] = useState(null);
            const [submitted, setSubmitted] = useState(false);

            const checkAnswer = () => {
                setSubmitted(true);
            };

            return (
                <div className="max-w-3xl mx-auto w-full p-6 pt-12">
                    <div className="flex items-center justify-between mb-8">
                        <h2 className="text-3xl font-bold">Daily Practice</h2>
                        <span className="px-3 py-1 bg-indigo-500/20 text-indigo-400 rounded-full text-xs font-bold border border-indigo-500/30">AP Calculus AB</span>
                    </div>

                    <div className="glass p-8 rounded-3xl border border-white/5">
                        <p className="text-sm text-eclipse-muted mb-4 font-semibold uppercase tracking-widest">Question 1</p>
                        <p className="text-xl font-medium mb-8">What is the derivative of f(x) = 3x² + 2x?</p>

                        <div className="space-y-3 mb-8">
                            {['6x + 2', '3x + 2', '6x', 'x² + x'].map((ans, idx) => {
                                const isCorrect = idx === 0;
                                let btnClass = "w-full text-left px-6 py-4 rounded-xl border transition-all font-medium text-lg ";
                                
                                if (!submitted) {
                                    btnClass += selected === idx ? "border-indigo-500 bg-indigo-500/10" : "border-white/10 bg-black/40 hover:bg-white/5";
                                } else {
                                    if (isCorrect) btnClass += "border-green-500 bg-green-500/20 text-green-300";
                                    else if (selected === idx) btnClass += "border-red-500 bg-red-500/20 text-red-300";
                                    else btnClass += "border-white/5 bg-black/40 opacity-50";
                                }

                                return (
                                    <button 
                                        key={idx} 
                                        onClick={() => !submitted && setSelected(idx)}
                                        className={btnClass}
                                        disabled={submitted}
                                    >
                                        {ans}
                                    </button>
                                );
                            })}
                        </div>

                        {submitted && (
                            <div className={`p-4 rounded-xl mb-6 ${selected === 0 ? 'bg-green-500/10 text-green-200' : 'bg-red-500/10 text-red-200'}`}>
                                {selected === 0 ? "Correct! Power rule: d/dx(3x²) = 6x, d/dx(2x) = 2." : "Incorrect. Remember to apply the power rule to both terms."}
                            </div>
                        )}

                        <button 
                            onClick={checkAnswer} 
                            disabled={selected === null || submitted}
                            className="w-full py-4 bg-indigo-600 disabled:bg-white/10 text-white font-bold rounded-xl hover:bg-indigo-500 transition-colors"
                        >
                            {submitted ? 'Next Question' : 'Check Answer'}
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 9. HOME VIEW (BEAUTIFIED)
        // ==========================================
        function HomeView({ setCurrentView, isLoggedIn }) {
            return (
                <div className="flex-grow flex flex-col items-center justify-center px-6 pb-20 text-center mt-12 relative">
                    <div className="max-w-5xl mx-auto relative z-10">
                        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-eclipse-muted text-sm mb-8 backdrop-blur-md">
                            <span className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                            Systems Operational - Version 3.0
                        </div>
                        <h1 className="text-6xl md:text-8xl font-extrabold tracking-tighter mb-6 text-transparent bg-clip-text bg-gradient-to-br from-white via-gray-200 to-gray-600 drop-shadow-sm">
                            Master the complex.
                        </h1>
                        <p className="text-lg md:text-xl text-eclipse-muted mb-12 max-w-2xl mx-auto leading-relaxed">
                            Eclipse AI is an uncompromising reasoning engine designed to force you to think, adapt, and conquer high-level mathematics and science.
                        </p>
                        <div className="flex flex-col sm:flex-row items-center justify-center gap-5 mb-24">
                            <button onClick={() => setCurrentView(isLoggedIn ? 'chat' : 'auth')} className="w-full sm:w-auto px-8 py-4 rounded-xl bg-white text-black font-bold hover:bg-gray-200 transition-all flex items-center justify-center gap-2 text-lg">
                                {isLoggedIn ? 'Open Workspace' : 'Start Learning Free'} <Icon name="arrow-right" size={20} />
                            </button>
                            <button onClick={() => setCurrentView('courses')} className="w-full sm:w-auto px-8 py-4 rounded-xl glass text-white font-bold hover:bg-white/10 transition-all flex items-center justify-center gap-2 text-lg">
                                <Icon name="grid" size={20} /> Browse Curriculum
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl mx-auto w-full">
                        <div className="glass p-8 rounded-3xl text-left border border-white/5 relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-br from-purple-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <Icon name="brain-circuit" size={32} className="text-purple-400 mb-6" />
                            <h3 className="text-2xl font-bold mb-3">Relentless AI</h3>
                            <p className="text-eclipse-muted text-sm leading-relaxed">Agents that do not just give answers, but guide you through the raw mechanics of the problem.</p>
                        </div>
                        <div className="glass p-8 rounded-3xl text-left border border-white/5 relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <Icon name="cpu" size={32} className="text-indigo-400 mb-6" />
                            <h3 className="text-2xl font-bold mb-3">Isolated Engines</h3>
                            <p className="text-eclipse-muted text-sm leading-relaxed">Luna handles pure logic and math. Sol handles physics and natural sciences. Zero context bleed.</p>
                        </div>
                        <div className="glass p-8 rounded-3xl text-left border border-white/5 relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-br from-emerald-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <Icon name="target" size={32} className="text-emerald-400 mb-6" />
                            <h3 className="text-2xl font-bold mb-3">Active Practice</h3>
                            <p className="text-eclipse-muted text-sm leading-relaxed">Apply what you learn immediately with in-browser practice environments tailored to your course.</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
