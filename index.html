<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | Intelligent Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <aside class="w-64 border-r border-white/10 p-6 flex flex-col gap-8">
            <div class="flex items-center gap-2 font-bold text-xl text-indigo-400"><i data-lucide="moon"></i> Eclipse</div>
            <nav class="space-y-4 text-sm text-gray-400">
                <a href="#" class="flex items-center gap-3 hover:text-white"><i data-lucide="database" size="18"></i> Knowledge Vault</a>
                <a href="#" class="flex items-center gap-3 hover:text-white"><i data-lucide="bar-chart-2" size="18"></i> Progress Tracking</a>
                <a href="#" class="flex items-center gap-3 hover:text-white"><i data-lucide="settings" size="18"></i> Settings</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-16 border-b border-white/10 flex items-center justify-between px-8">
                <div class="flex gap-2 bg-black/50 p-1 rounded-lg border border-white/5">
                    <button id="lunaBtn" class="px-4 py-1.5 rounded text-sm font-medium bg-indigo-600 transition">Luna (Math)</button>
                    <button id="solBtn" class="px-4 py-1.5 rounded text-sm font-medium hover:bg-white/10 transition">Sol (Science)</button>
                </div>
                <button class="bg-white text-black px-5 py-1.5 rounded-full text-sm font-bold hover:bg-gray-200">Sign Up</button>
            </header>

            <section class="flex-1 flex flex-col items-center justify-center p-8">
                <div class="w-full max-w-2xl glass p-8 rounded-2xl">
                    <h2 id="engineTitle" class="text-2xl font-bold mb-6">Luna Math Engine</h2>
                    <textarea id="userInput" class="w-full h-40 bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:border-indigo-500 outline-none transition" placeholder="How can I help you learn today?"></textarea>
                    <button id="submitBtn" class="w-full mt-4 bg-indigo-600 py-3 rounded-xl font-semibold hover:bg-indigo-500 transition">Ask AI</button>
                    <div id="aiResponse" class="mt-6 p-4 bg-white/5 rounded-xl text-sm hidden"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const state = { engine: 'luna' };
        
        document.getElementById('submitBtn').onclick = async () => {
            const input = document.getElementById('userInput').value;
            const resDiv = document.getElementById('aiResponse');
            resDiv.classList.remove('hidden');
            resDiv.innerText = "Thinking...";

            // This talks to the backend logic we will set up
            const response = await fetch('/api/chat', {
                method: 'POST',
                body: JSON.stringify({ prompt: input, engine: state.engine })
            });
            const data = await response.json();
            resDiv.innerText = data.reply;
        };

        // Engine Toggle Logic
        document.getElementById('lunaBtn').onclick = (e) => {
            state.engine = 'luna';
            document.getElementById('engineTitle').innerText = 'Luna Math Engine';
            e.target.className = 'px-4 py-1.5 rounded text-sm font-medium bg-indigo-600';
            document.getElementById('solBtn').className = 'px-4 py-1.5 rounded text-sm font-medium hover:bg-white/10';
        };
    </script>
</body>
</html>
