<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI</title>
    <link rel="icon" type="image/jpeg" href="2.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 15, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen overflow-hidden">
        <aside class="w-64 border-r border-white/10 p-6 flex flex-col gap-8">
            <div class="flex items-center gap-3 font-bold text-xl">
                <img src="2.jpg" alt="Logo" class="w-8 h-8 rounded-full border border-white/20">
                Eclipse
            </div>
            <nav class="space-y-4 text-sm text-gray-400">
                <a href="#" class="flex items-center gap-3 hover:text-white transition"><i data-lucide="database" size="18"></i> Knowledge Vault</a>
                <a href="#" class="flex items-center gap-3 hover:text-white transition"><i data-lucide="bar-chart-2" size="18"></i> Progress Tracking</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="h-16 border-b border-white/10 flex items-center justify-between px-8">
                <div class="flex gap-2 bg-black/50 p-1 rounded-lg border border-white/5">
                    <button id="lunaBtn" class="px-4 py-1.5 rounded text-sm font-medium bg-indigo-600 transition flex items-center">
                        <img src="3.jpg" class="w-4 h-4 mr-2 rounded-full"> Luna (Math)
                    </button>
                    <button id="solBtn" class="px-4 py-1.5 rounded text-sm font-medium hover:bg-white/10 transition flex items-center">
                        <img src="4.jpg" class="w-4 h-4 mr-2 rounded-full"> Sol (Science)
                    </button>
                </div>
                <button class="bg-white text-black px-5 py-1.5 rounded-full text-sm font-bold hover:bg-gray-200">Sign Up</button>
            </header>

            <section class="flex-1 flex items-center justify-center p-8">
                <div class="w-full max-w-2xl glass p-8 rounded-2xl border border-white/10">
                    <h2 id="engineTitle" class="text-2xl font-bold mb-6">Luna Math Engine</h2>
                    <textarea class="w-full h-40 bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:border-indigo-500 outline-none transition" placeholder="Ask your question..."></textarea>
                    <button class="w-full mt-4 bg-indigo-600 py-3 rounded-xl font-semibold hover:bg-indigo-500 transition">Submit Request</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const lunaBtn = document.getElementById('lunaBtn');
        const solBtn = document.getElementById('solBtn');
        const engineTitle = document.getElementById('engineTitle');

        lunaBtn.onclick = () => {
            engineTitle.innerText = 'Luna Math Engine';
            lunaBtn.className = 'px-4 py-1.5 rounded text-sm font-medium bg-indigo-600 transition flex items-center';
            solBtn.className = 'px-4 py-1.5 rounded text-sm font-medium hover:bg-white/10 transition flex items-center';
        };

        solBtn.onclick = () => {
            engineTitle.innerText = 'Sol Science Engine';
            solBtn.className = 'px-4 py-1.5 rounded text-sm font-medium bg-yellow-600 transition flex items-center';
            lunaBtn.className = 'px-4 py-1.5 rounded text-sm font-medium hover:bg-white/10 transition flex items-center';
        };
    </script>
</body>
</html>
