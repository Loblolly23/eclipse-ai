<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eclipse AI | Master the Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050505; --glass: rgba(20, 20, 25, 0.7); }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root" class="flex h-screen">
        <aside class="w-64 border-r border-white/10 p-6 flex flex-col gap-8">
            <div class="flex items-center gap-3 font-bold text-xl">
                <img src="2.jpg" class="w-8 h-8 rounded-full border border-white/20">
                Eclipse AI
            </div>
            <nav class="space-y-2 text-sm text-gray-400">
                <button onclick="setView('dashboard')" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-lg"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                <button onclick="setView('chat')" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-lg"><i data-lucide="message-square"></i> Chat</button>
                <button onclick="setView('courses')" class="w-full flex items-center gap-3 p-3 hover:bg-white/5 rounded-lg"><i data-lucide="book-open"></i> Courses</button>
            </nav>
        </aside>

        <main id="main-content" class="flex-1 flex flex-col">
            <header class="h-16 border-b border-white/10 flex items-center justify-between px-8">
                <div id="engine-toggle" class="flex gap-1 bg-black/50 p-1 rounded-lg border border-white/10">
                    <button onclick="setEngine('luna')" id="luna-btn" class="px-4 py-1.5 rounded text-sm bg-indigo-600 flex items-center"><img src="3.jpg" class="w-4 h-4 mr-2 rounded-full"> Luna</button>
                    <button onclick="setEngine('sol')" id="sol-btn" class="px-4 py-1.5 rounded text-sm hover:bg-white/10 flex items-center"><img src="4.jpg" class="w-4 h-4 mr-2 rounded-full"> Sol</button>
                </div>
            </header>
            
            <div id="view" class="p-8"></div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const state = { view: 'dashboard', engine: 'luna' };

        function setView(view) {
            state.view = view;
            const viewDiv = document.getElementById('view');
            if(view === 'chat') {
                viewDiv.innerHTML = `<div class="max-w-2xl mx-auto glass p-8 rounded-3xl">
                    <h2 class="text-2xl font-bold mb-4">${state.engine === 'luna' ? 'Luna' : 'Sol'} Reasoning Engine</h2>
                    <textarea class="w-full h-40 bg-black/40 border border-white/10 rounded-xl p-4 text-sm" placeholder="Ask your question..."></textarea>
                    <button class="w-full mt-4 bg-indigo-600 py-3 rounded-xl font-bold">Ask AI</button>
                </div>`;
            } else {
                viewDiv.innerHTML = `<h1 class="text-3xl font-bold">Welcome to your ${view}</h1>`;
            }
        }

        function setEngine(engine) {
            state.engine = engine;
            document.getElementById('luna-btn').className = engine === 'luna' ? 'px-4 py-1.5 rounded text-sm bg-indigo-600 flex items-center' : 'px-4 py-1.5 rounded text-sm hover:bg-white/10 flex items-center';
            document.getElementById('sol-btn').className = engine === 'sol' ? 'px-4 py-1.5 rounded text-sm bg-yellow-600 flex items-center' : 'px-4 py-1.5 rounded text-sm hover:bg-white/10 flex items-center';
            setView(state.view);
        }
        
        setView('dashboard');
    </script>
</body>
</html>
